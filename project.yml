name: paiOS
options:
  bundleIdPrefix: ai.ourpai
  deploymentTarget:
    iOS: "26.0"
    watchOS: "11.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "3YBM7ACN68"
    CODE_SIGN_STYLE: Automatic
targets:
  paiOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Shared
      - path: Phone
    dependencies:
      - target: "paiOS Watch App"
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.ourpai.paios
        INFOPLIST_FILE: Phone/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: NO
        CODE_SIGN_STYLE: Automatic
  "paiOS Watch App":
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: Shared
      - path: Watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.ourpai.paios.watchkitapp
        INFOPLIST_FILE: Watch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
